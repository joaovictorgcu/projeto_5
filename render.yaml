services:
  - type: web
    name: keyflow
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: keyflow-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.13.2

databases:
  - name: keyflow-db
    plan: free
    databaseName: keyflow
