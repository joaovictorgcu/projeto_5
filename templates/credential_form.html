{% extends "base.html" %}
{% block title %}{{ 'Editar' if editing else 'Nova' }} Credencial - KeyFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ 'Editar Credencial' if editing else 'Nova Credencial' }}</h1>
</div>

<div class="form-container">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="name">Nome do serviço</label>
            <input type="text" id="name" name="name" required
                   placeholder="Ex: Instagram, Gmail, AWS"
                   value="{{ cred.name if editing else '' }}">
        </div>

        <div class="form-group">
            <label for="login">Login / E-mail</label>
            <input type="text" id="login" name="login" required
                   placeholder="Ex: equipe@empresa.com"
                   value="{{ cred.login if editing else '' }}">
        </div>

        <div class="form-group">
            <label for="password">Senha {{ '(deixe vazio para manter a atual)' if editing else '' }}</label>
            <input type="password" id="password" name="password"
                   placeholder="{{ 'Nova senha (opcional)' if editing else 'Senha do serviço' }}"
                   {{ '' if editing else 'required' }}>
            <button type="button" class="btn-toggle-pw" onclick="togglePasswordField('password')">Mostrar</button>
        </div>

        <!-- Indicador de força -->
        <div class="pw-strength">
            <div class="pw-strength-track">
                <div class="pw-strength-bar" id="pw-strength-bar"></div>
            </div>
            <span class="pw-strength-label" id="pw-strength-label"></span>
        </div>

        <!-- Gerador de senhas -->
        <div class="pw-generator">
            <div class="pw-generator-header" onclick="toggleGenerator()">
                <span>&#9881; Gerador de senhas</span>
                <span class="pw-generator-arrow" id="gen-arrow">&#9660;</span>
            </div>
            <div class="pw-generator-body" id="gen-body" style="display:none;">
                <div class="gen-options">
                    <div class="gen-option">
                        <label for="pw-length">Tamanho</label>
                        <input type="range" id="pw-length" min="8" max="32" value="16" oninput="document.getElementById('pw-length-val').textContent=this.value">
                        <span id="pw-length-val">16</span>
                    </div>
                    <div class="gen-checkboxes">
                        <label><input type="checkbox" id="pw-upper" checked> Maiúsculas (A-Z)</label>
                        <label><input type="checkbox" id="pw-lower" checked> Minúsculas (a-z)</label>
                        <label><input type="checkbox" id="pw-numbers" checked> Números (0-9)</label>
                        <label><input type="checkbox" id="pw-symbols" checked> Símbolos (!@#$)</label>
                    </div>
                </div>
                <button type="button" class="btn btn-primary btn-block" onclick="generatePassword()">Gerar senha segura</button>
            </div>
        </div>

        <div class="form-group">
            <label for="category">Categoria</label>
            <select id="category" name="category" class="form-select">
                {% set cat = cred.category if editing else 'outros' %}
                <option value="rede_social" {{ 'selected' if cat == 'rede_social' }}>Rede Social</option>
                <option value="email" {{ 'selected' if cat == 'email' }}>E-mail</option>
                <option value="financeiro" {{ 'selected' if cat == 'financeiro' }}>Financeiro</option>
                <option value="cloud" {{ 'selected' if cat == 'cloud' }}>Cloud / Dev</option>
                <option value="comunicacao" {{ 'selected' if cat == 'comunicacao' }}>Comunicação</option>
                <option value="marketing" {{ 'selected' if cat == 'marketing' }}>Marketing</option>
                <option value="outros" {{ 'selected' if cat == 'outros' }}>Outros</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Observação (opcional)</label>
            <textarea id="notes" name="notes" rows="3"
                      placeholder="Informações adicionais...">{{ cred.notes if editing else '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ 'Salvar alterações' if editing else 'Salvar credencial' }}</button>
            <a href="{{ url_for('vault.index') }}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleGenerator() {
    var body = document.getElementById('gen-body');
    var arrow = document.getElementById('gen-arrow');
    if (body.style.display === 'none') {
        body.style.display = 'block';
        arrow.innerHTML = '&#9650;';
    } else {
        body.style.display = 'none';
        arrow.innerHTML = '&#9660;';
    }
}
</script>
{% endblock %}
