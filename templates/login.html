{% extends "base.html" %}
{% block title %}Entrar - KeyFlow{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-brand"><span class="brand-key">key</span><span class="brand-flow">flow</span></h1>
            <h2>Bem-vindo de volta</h2>
            <p class="auth-desc">Entre na sua conta para acessar o cofre da sua equipe.</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" id="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="email">E-mail</label>
                <div class="input-icon-wrapper">
                    <svg class="input-icon"><use href="#icon-user"/></svg>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com" autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <div class="input-icon-wrapper">
                    <svg class="input-icon"><use href="#icon-lock"/></svg>
                    <input type="password" id="password" name="password" required placeholder="Sua senha" autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
                <span class="btn-text">Entrar</span>
            </button>
        </form>

        <div class="auth-divider">
            <span>ou</span>
        </div>

        <p class="auth-footer">
            Não tem conta? <a href="{{ url_for('auth.register') }}">Crie uma grátis</a>
        </p>
    </div>
</div>
{% endblock %}
